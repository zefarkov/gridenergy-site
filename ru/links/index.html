<style>
:root{
  --bg:#eef2f6;
  --surface:#ffffff;
  --text:#101828;
  --muted:#667085;
  --line:#e4e9ef;
  --accent:#183b56;
  --accent-soft:#f1f5f9;
  --shadow:0 6px 18px rgba(16,24,40,.06);
  --radius:18px;
  --max:440px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}

body{
  min-height:100vh;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,#f4f7fa,#edf2f6);
  display:flex;
  justify-content:center;
  padding:34px 14px 40px;
  -webkit-font-smoothing:antialiased;
}

.wrap{width:min(100%,var(--max))}

a{text-decoration:none;color:inherit}

/* HEADER */
.head{
  text-align:center;
  margin-bottom:22px;
}

.logo{
  width:300px;
  margin:0 auto 16px;
  display:block;
}

.desc{
  margin:0 auto;
  max-width:320px;
  font-size:14px;
  line-height:1.55;
  color:var(--muted);
}

/* LINKS */
.list{
  display:grid;
  gap:10px;
}

.link{
  display:grid;
  grid-template-columns:48px 1fr 38px;
  gap:12px;
  align-items:center;
  padding:10px 12px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  transition:.15s ease;
}

.link:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 22px rgba(16,24,40,.08);
}

.icon{
  width:42px;
  height:42px;
  border-radius:12px;
  background:#f4f7fa;
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--accent);
}

.icon svg{
  width:20px;
  height:20px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.title{
  font-size:15px;
  font-weight:600;
}

.text{
  margin-top:2px;
  font-size:12px;
  color:var(--muted);
}

.go{
  width:34px;
  height:34px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--accent-soft);
  border:1px solid var(--line);
  color:var(--accent);
}

.go svg{
  width:16px;
  height:16px;
  stroke:currentColor;
  fill:none;
  stroke-width:2.2;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.grid-2 .link{
  grid-template-columns:44px 1fr 34px;
}

.grid-2 .icon{width:38px;height:38px}
.grid-2 .go{width:30px;height:30px}

@media (max-width:420px){
  .grid-2{grid-template-columns:1fr}
}
.active-lang{background:#183b56 !important;color:#fff !important;border-color:#183b56 !important;}
</style>
