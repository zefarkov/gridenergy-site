<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 — GRID</title>
  <meta name="robots" content="noindex, follow" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    .brand {
      font-size: 12px;
      letter-spacing: 0.35em;
      opacity: 0.5;
      margin-bottom: 28px;
    }

    .code {
      font-size: clamp(90px, 18vw, 180px);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .title {
      margin-top: 18px;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .text {
      margin-top: 14px;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      line-height: 1.7;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      margin-top: 36px;

      height: 46px;
      padding: 0 22px;

      border: 1px solid rgba(255,255,255,0.14);

      color: #fff;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;

      transition: 0.2s ease;
    }

    .button:hover {
      background: #fff;
      color: #000;
    }

    .line {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,0.14);
      margin: 32px auto 0;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="brand">GRID</div>

    <div class="code">404</div>

    <h1 class="title">Page Not Found</h1>

    <p class="text">
      The page you are looking for does not exist<br>
      or has been moved.
    </p>

    <a href="/" class="button">
      Back to Home
    </a>

    <div class="line"></div>
  </main>
</body>
</html>
